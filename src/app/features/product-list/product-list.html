<table class="table">
  <thead>
    <tr>
      <th scope="col">Id</th>
      <th scope="col">Name</th>
      <th scope="col">Category</th>
      <th scope="col">Price</th>
      <th scope="col">Currency</th>
      <th scope="col">Status</th>
      <th scope="col">Rating</th>
    </tr>
  </thead>
  <tbody>
    @for (product of products; track product.id) {
      <tr>
        <td>{{product.id}}<i class="bi bi-alarm"></i></td>
        <th scope="row"><a routerLink="/products/123">{{product.name}}</a></th>
        <td>{{product.category}}</td>
        <td>{{product.price}}</td>
        <td>{{product.currency}}</td>
        <td><span class="badge rounded-pill text-bg-success">{{product.status}}</span></td>
        <td>{{product.rating}}</td>
      </tr>
    }
  </tbody>
</table>
